services:
  mysql:
    image: mysql:8.4
    container_name: tor-study-bot-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: tor_study_bot
      MYSQL_USER: tor_user
      MYSQL_PASSWORD: tor_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
